<svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="globeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#4682b4"/>
      <stop offset="40%" stopColor="#5b6ba0"/>
      <stop offset="70%" stopColor="#7b4a9f"/>
      <stop offset="100%" stopColor="#8b3a99"/>
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="140" cy="140" r="125" fill="none" stroke="url(#globeGradient)" stroke-width="3.5"/>
  
  <!-- Latitude lines -->
  <circle cx="140" cy="140" r="90" fill="none" stroke="url(#globeGradient)" stroke-width="3" opacity="0.85"/>
  <circle cx="140" cy="140" r="55" fill="none" stroke="url(#globeGradient)" stroke-width="3" opacity="0.85"/>
  
  <!-- Vertical center line -->
  <line x1="140" y1="15" x2="140" y2="265" stroke="url(#globeGradient)" stroke-width="3" opacity="0.9"/>
  
  <!-- Left curved longitude line -->
  <path d="M 75 45 Q 55 90 65 140 Q 55 190 75 235" fill="none" stroke="url(#globeGradient)" stroke-width="3" opacity="0.8"/>
  
  <!-- Right curved longitude line -->
  <path d="M 205 45 Q 225 90 215 140 Q 225 190 205 235" fill="none" stroke="url(#globeGradient)" stroke-width="3" opacity="0.8"/>
  
  <!-- Top latitude ellipse -->
  <ellipse cx="140" cy="75" rx="95" ry="22" fill="none" stroke="url(#globeGradient)" stroke-width="3" opacity="0.8"/>
  
  <!-- Center latitude ellipse -->
  <ellipse cx="140" cy="140" rx="115" ry="32" fill="none" stroke="url(#globeGradient)" stroke-width="3" opacity="0.85"/>
  
  <!-- Bottom latitude ellipse -->
  <ellipse cx="140" cy="205" rx="95" ry="22" fill="none" stroke="url(#globeGradient)" stroke-width="3" opacity="0.8"/>
</svg>