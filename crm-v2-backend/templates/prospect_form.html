{% extends "base.html" %}

{% block content %}
<h2>{{ title }}</h2>
<form method="post">
    <div class="mb-3">
        <label for="school_name" class="form-label">School Name</label>
        <input type="text" class="form-control" id="school_name" name="school_name"
            value="{{ prospect.school_name if prospect else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="country" class="form-label">Country</label>
        <input type="text" class="form-control" id="country" name="country"
            value="{{ prospect.country if prospect else '' }}" required>
        <div class="form-text">Target Countries (+20): France, USA, UK, Canada, Australia</div>
    </div>
    <div class="mb-3">
        <label for="type" class="form-label">Type</label>
        <select class="form-select" id="type" name="type" required>
            <option value="public" {% if prospect and prospect.type=='public' %}selected{% endif %}>Public</option>
            <option value="private" {% if prospect and prospect.type=='private' %}selected{% endif %}>Private</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="contact_role" class="form-label">Contact Role</label>
        <input type="text" class="form-control" id="contact_role" name="contact_role"
            value="{{ prospect.contact_role if prospect else '' }}" required>
        <div class="form-text">Bonus for Director/Principal or Teacher</div>
    </div>
    <div class="mb-3">
        <label for="status" class="form-label">Status</label>
        <select class="form-select" id="status" name="status" required>
            {% for status in ['Nouveau', 'Contacté', 'Répondu', 'Intéressé', 'Démo planifiée', 'Démo réalisée',
            'Client', 'Perdu'] %}
            <option value="{{ status }}" {% if prospect and prospect.status==status %}selected{% endif %}>{{ status }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email"
            value="{{ prospect.email if prospect else '' }}">
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('prospects.list_prospects') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
