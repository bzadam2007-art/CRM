{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2>Dashboard</h2>
    </div>
</div>

<div class="row">
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-header">Prospects by Country</div>
            <div class="card-body">
                <canvas id="countryChart"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-header">Prospects by Status</div>
            <div class="card-body">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-header">Prospects by Priority</div>
            <div class="card-body">
                <canvas id="priorityChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        fetch('{{ url_for("main.get_dashboard_stats") }}')
            .then(response => response.json())
            .then(data => {
                // Colors
                const colors = ['#007bff', '#28a745', '#dc3545', '#ffc107', '#17a2b8', '#6610f2', '#fd7e14', '#20c997'];

                // Country Chart (Bar)
                new Chart(document.getElementById('countryChart'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(data.countries),
                        datasets: [{
                            label: 'Count',
                            data: Object.values(data.countries),
                            backgroundColor: colors
                        }]
                    }
                });

                // Status Chart (Doughnut)
                new Chart(document.getElementById('statusChart'), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(data.statuses),
                        datasets: [{
                            data: Object.values(data.statuses),
                            backgroundColor: colors
                        }]
                    }
                });

                // Priority Chart (Pie)
                new Chart(document.getElementById('priorityChart'), {
                    type: 'pie',
                    data: {
                        labels: Object.keys(data.priorities),
                        datasets: [{
                            data: Object.values(data.priorities),
                            backgroundColor: ['#dc3545', '#ffc107', '#17a2b8'] // Red, Yellow, Teal for Priority
                        }]
                    }
                });
            });
    });
</script>
{% endblock %}
